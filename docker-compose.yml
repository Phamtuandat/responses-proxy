services:
  responses-proxy:
    build: .
    container_name: responses-proxy
    ports:
      - "8318:8318"
    volumes:
      - ./logs:/app/logs
      - ${HOME}/.hermes/config.yaml:/host-home/.hermes/config.yaml
      - ${HOME}/.codex:/host-home/.codex
    environment:
      PORT: "8318"
      HOST: "0.0.0.0"
      UPSTREAM_BASE_URL: "${UPSTREAM_BASE_URL}"
      UPSTREAM_API_KEY: "${UPSTREAM_API_KEY}"
      PROVIDER_USAGE_CHECK_URL: "${PROVIDER_USAGE_CHECK_URL:-}"
      PROVIDER_USAGE_CHECK_ENABLED: "${PROVIDER_USAGE_CHECK_ENABLED:-true}"
      REQUEST_TIMEOUT_MS: "${REQUEST_TIMEOUT_MS:-300000}"
      STREAM_IDLE_TIMEOUT_MS: "${STREAM_IDLE_TIMEOUT_MS:-330000}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_BODY: "${LOG_BODY:-false}"
      CHATGPT_OAUTH_ENABLED: "${CHATGPT_OAUTH_ENABLED:-true}"
      CHATGPT_OAUTH_CLIENT_ID: "${CHATGPT_OAUTH_CLIENT_ID:-app_EMoamEEZ73f0CkXaXp7hrann}"
      CHATGPT_OAUTH_REDIRECT_URI: "${CHATGPT_OAUTH_REDIRECT_URI:-http://localhost:1455/auth/callback}"
      CHATGPT_OAUTH_CALLBACK_PORT: "${CHATGPT_OAUTH_CALLBACK_PORT:-1455}"
      CHATGPT_OAUTH_AUTH_URL: "${CHATGPT_OAUTH_AUTH_URL:-https://auth.openai.com/oauth/authorize}"
      CHATGPT_OAUTH_TOKEN_URL: "${CHATGPT_OAUTH_TOKEN_URL:-https://auth.openai.com/oauth/token}"
      CHATGPT_OAUTH_DEVICE_USER_CODE_URL: "${CHATGPT_OAUTH_DEVICE_USER_CODE_URL:-https://auth.openai.com/api/accounts/deviceauth/usercode}"
      CHATGPT_OAUTH_DEVICE_TOKEN_URL: "${CHATGPT_OAUTH_DEVICE_TOKEN_URL:-https://auth.openai.com/api/accounts/deviceauth/token}"
      CHATGPT_OAUTH_DEVICE_VERIFICATION_URL: "${CHATGPT_OAUTH_DEVICE_VERIFICATION_URL:-https://auth.openai.com/codex/device}"
      CHATGPT_CODEX_BASE_URL: "${CHATGPT_CODEX_BASE_URL:-https://chatgpt.com/backend-api/codex}"
      CHATGPT_OAUTH_REFRESH_LEAD_DAYS: "${CHATGPT_OAUTH_REFRESH_LEAD_DAYS:-5}"
      OPENCLAW_TOKEN_OPTIMIZATION_ENABLED: "${OPENCLAW_TOKEN_OPTIMIZATION_ENABLED:-true}"
      OPENCLAW_DEFAULT_REASONING_SUMMARY: "${OPENCLAW_DEFAULT_REASONING_SUMMARY:-auto}"
      OPENCLAW_DEFAULT_TEXT_VERBOSITY: "${OPENCLAW_DEFAULT_TEXT_VERBOSITY:-low}"
      OPENCLAW_DEFAULT_MAX_OUTPUT_TOKENS: "${OPENCLAW_DEFAULT_MAX_OUTPUT_TOKENS:-}"
      OPENCLAW_AUTO_PROMPT_CACHE_KEY: "${OPENCLAW_AUTO_PROMPT_CACHE_KEY:-true}"
      OPENCLAW_PROMPT_CACHE_RETENTION: "${OPENCLAW_PROMPT_CACHE_RETENTION:-24h}"
      PROVIDER_PROMPT_CACHE_REDESIGN_ENABLED: "${PROVIDER_PROMPT_CACHE_REDESIGN_ENABLED:-true}"
      PROVIDER_PROMPT_CACHE_STABLE_SUMMARIZATION_ENABLED: "${PROVIDER_PROMPT_CACHE_STABLE_SUMMARIZATION_ENABLED:-true}"
      PROVIDER_PROMPT_CACHE_INFLIGHT_DEDUPE_ENABLED: "${PROVIDER_PROMPT_CACHE_INFLIGHT_DEDUPE_ENABLED:-true}"
      PROVIDER_PROMPT_CACHE_RETENTION_BY_FAMILY_ENABLED: "${PROVIDER_PROMPT_CACHE_RETENTION_BY_FAMILY_ENABLED:-false}"
      PROVIDER_PROMPT_CACHE_SUMMARY_TRIGGER_ITEMS: "${PROVIDER_PROMPT_CACHE_SUMMARY_TRIGGER_ITEMS:-24}"
      PROVIDER_PROMPT_CACHE_SUMMARY_KEEP_RECENT_ITEMS: "${PROVIDER_PROMPT_CACHE_SUMMARY_KEEP_RECENT_ITEMS:-8}"
      PROVIDER_PROMPT_CACHE_RETENTION_BY_FAMILY: "${PROVIDER_PROMPT_CACHE_RETENTION_BY_FAMILY:-}"
      STRIP_MAX_OUTPUT_TOKENS_FOR_PROVIDER: "${STRIP_MAX_OUTPUT_TOKENS_FOR_PROVIDER:-false}"
      SANITIZE_REASONING_SUMMARY_FOR_PROVIDER: "${SANITIZE_REASONING_SUMMARY_FOR_PROVIDER:-false}"
      FALLBACK_ENABLED: "${FALLBACK_ENABLED:-true}"
      FALLBACK_STATUS_CODES: "${FALLBACK_STATUS_CODES:-429,500,502,503,504}"
      APP_DB_PATH: "${APP_DB_PATH:-/app/logs/app.sqlite}"
      CUSTOMER_KEY_DB_PATH: "${CUSTOMER_KEY_DB_PATH:-/app/logs/telegram-bot.sqlite}"
      SESSION_LOG_DIR: "/app/logs/sessions"
      SESSION_LOG_RETENTION_DAYS: "${SESSION_LOG_RETENTION_DAYS:-14}"
      QUICK_APPLY_HERMES_CONFIG_PATH: "/host-home/.hermes/config.yaml"
      QUICK_APPLY_CODEX_CONFIG_PATH: "/host-home/.codex/config.toml"
      QUICK_APPLY_CODEX_AUTH_PATH: "/host-home/.codex/auth.json"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8318/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  telegram-bot:
    build: .
    container_name: responses-proxy-telegram-bot
    command: ["node", "dist/telegram-bot/index.js"]
    depends_on:
      responses-proxy:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_ALLOWED_USER_IDS: "${TELEGRAM_ALLOWED_USER_IDS:-}"
      TELEGRAM_ALLOWED_CHAT_IDS: "${TELEGRAM_ALLOWED_CHAT_IDS:-}"
      TELEGRAM_OWNER_USER_IDS: "${TELEGRAM_OWNER_USER_IDS:-}"
      TELEGRAM_ADMIN_USER_IDS: "${TELEGRAM_ADMIN_USER_IDS:-}"
      TELEGRAM_CUSTOMER_USER_IDS: "${TELEGRAM_CUSTOMER_USER_IDS:-}"
      TELEGRAM_BOT_MODE: "${TELEGRAM_BOT_MODE:-polling}"
      TELEGRAM_WEBHOOK_URL: "${TELEGRAM_WEBHOOK_URL:-}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET:-}"
      RESPONSES_PROXY_ADMIN_BASE_URL: "http://responses-proxy:8318"
      RESPONSES_PROXY_CLIENT_API_KEY: "${RESPONSES_PROXY_CLIENT_API_KEY:-}"
      RESPONSES_PROXY_DEFAULT_MODEL: "${RESPONSES_PROXY_DEFAULT_MODEL:-gpt-5.5}"
      BOT_PUBLIC_SIGNUP_ENABLED: "${BOT_PUBLIC_SIGNUP_ENABLED:-false}"
      BOT_REQUIRE_ADMIN_APPROVAL: "${BOT_REQUIRE_ADMIN_APPROVAL:-true}"
      BOT_DEFAULT_CUSTOMER_ROUTE: "${BOT_DEFAULT_CUSTOMER_ROUTE:-customers}"
      BOT_PUBLIC_RESPONSES_BASE_URL: "${BOT_PUBLIC_RESPONSES_BASE_URL:-http://127.0.0.1:8318/v1}"
      BOT_PROXY_REQUEST_TIMEOUT_MS: "${BOT_PROXY_REQUEST_TIMEOUT_MS:-30000}"
      BOT_SESSION_DB_PATH: "${BOT_SESSION_DB_PATH:-/app/logs/telegram-bot.sqlite}"
      BOT_SESSION_TTL_MS: "${BOT_SESSION_TTL_MS:-900000}"
      BOT_RATE_LIMIT_WINDOW_MS: "${BOT_RATE_LIMIT_WINDOW_MS:-60000}"
      BOT_RATE_LIMIT_MAX_REQUESTS: "${BOT_RATE_LIMIT_MAX_REQUESTS:-12}"
      BOT_LOG_LEVEL: "${BOT_LOG_LEVEL:-info}"
    restart: unless-stopped

  telegram-bot-worker:
    build: .
    container_name: responses-proxy-telegram-bot-worker
    command: ["node", "dist/telegram-bot/worker.js"]
    depends_on:
      responses-proxy:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_ALLOWED_USER_IDS: "${TELEGRAM_ALLOWED_USER_IDS:-}"
      TELEGRAM_ALLOWED_CHAT_IDS: "${TELEGRAM_ALLOWED_CHAT_IDS:-}"
      TELEGRAM_OWNER_USER_IDS: "${TELEGRAM_OWNER_USER_IDS:-}"
      TELEGRAM_ADMIN_USER_IDS: "${TELEGRAM_ADMIN_USER_IDS:-}"
      TELEGRAM_CUSTOMER_USER_IDS: "${TELEGRAM_CUSTOMER_USER_IDS:-}"
      TELEGRAM_BOT_MODE: "${TELEGRAM_BOT_MODE:-polling}"
      TELEGRAM_WEBHOOK_URL: "${TELEGRAM_WEBHOOK_URL:-}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET:-}"
      RESPONSES_PROXY_ADMIN_BASE_URL: "http://responses-proxy:8318"
      RESPONSES_PROXY_CLIENT_API_KEY: "${RESPONSES_PROXY_CLIENT_API_KEY:-}"
      RESPONSES_PROXY_DEFAULT_MODEL: "${RESPONSES_PROXY_DEFAULT_MODEL:-gpt-5.5}"
      BOT_PUBLIC_SIGNUP_ENABLED: "${BOT_PUBLIC_SIGNUP_ENABLED:-false}"
      BOT_REQUIRE_ADMIN_APPROVAL: "${BOT_REQUIRE_ADMIN_APPROVAL:-true}"
      BOT_DEFAULT_CUSTOMER_ROUTE: "${BOT_DEFAULT_CUSTOMER_ROUTE:-customers}"
      BOT_PUBLIC_RESPONSES_BASE_URL: "${BOT_PUBLIC_RESPONSES_BASE_URL:-http://127.0.0.1:8318/v1}"
      BOT_PROXY_REQUEST_TIMEOUT_MS: "${BOT_PROXY_REQUEST_TIMEOUT_MS:-30000}"
      BOT_SESSION_DB_PATH: "${BOT_SESSION_DB_PATH:-/app/logs/telegram-bot.sqlite}"
      BOT_SESSION_TTL_MS: "${BOT_SESSION_TTL_MS:-900000}"
      BOT_RATE_LIMIT_WINDOW_MS: "${BOT_RATE_LIMIT_WINDOW_MS:-60000}"
      BOT_RATE_LIMIT_MAX_REQUESTS: "${BOT_RATE_LIMIT_MAX_REQUESTS:-12}"
      BOT_LOG_LEVEL: "${BOT_LOG_LEVEL:-info}"
      BOT_WORKER_INTERVAL_MS: "${BOT_WORKER_INTERVAL_MS:-60000}"
      BOT_WORKER_ONCE: "${BOT_WORKER_ONCE:-false}"
    restart: unless-stopped
